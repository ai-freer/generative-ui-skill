<!--
  Trigger prompt: "做一个复利计算器"
  Widget type: Interactive HTML with sliders
  Guidelines used: core + ui-components + color-palette
-->
<div style="display: flex; align-items: center; gap: 12px; margin: 0 0 1rem;">
  <label style="font-size: 14px; color: var(--color-text-secondary); min-width: 80px;">Principal</label>
  <input type="range" min="1000" max="100000" value="10000" step="1000" id="principal" style="flex: 1;" oninput="calculate()">
  <span style="font-size: 14px; font-weight: 500; min-width: 72px; text-align: right;" id="principal-out">$10,000</span>
</div>

<div style="display: flex; align-items: center; gap: 12px; margin: 0 0 1rem;">
  <label style="font-size: 14px; color: var(--color-text-secondary); min-width: 80px;">Rate (%)</label>
  <input type="range" min="1" max="20" value="7" step="0.5" id="rate" style="flex: 1;" oninput="calculate()">
  <span style="font-size: 14px; font-weight: 500; min-width: 72px; text-align: right;" id="rate-out">7.0%</span>
</div>

<div style="display: flex; align-items: center; gap: 12px; margin: 0 0 1.5rem;">
  <label style="font-size: 14px; color: var(--color-text-secondary); min-width: 80px;">Years</label>
  <input type="range" min="1" max="40" value="20" step="1" id="years" style="flex: 1;" oninput="calculate()">
  <span style="font-size: 14px; font-weight: 500; min-width: 72px; text-align: right;" id="years-out">20</span>
</div>

<div style="display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 1.5rem;">
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Future value</div>
    <div style="font-size: 24px; font-weight: 500;" id="future-value">$38,697</div>
  </div>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Interest earned</div>
    <div style="font-size: 24px; font-weight: 500; color: var(--color-text-success);" id="interest-earned">$28,697</div>
  </div>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Total return</div>
    <div style="font-size: 24px; font-weight: 500;" id="total-return">287%</div>
  </div>
</div>

<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 8px; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #534AB7;"></span>Compound growth</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #888780;"></span>Simple interest</span>
</div>

<div style="position: relative; width: 100%; height: 240px;">
  <canvas id="compoundChart"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" onload="initChart()"></script>
<script>
var chart;
function initChart() {
  chart = new Chart(document.getElementById('compoundChart'), {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        { label: 'Compound', data: [], borderColor: '#534AB7', backgroundColor: 'rgba(83,74,183,0.08)', fill: true, tension: 0.3, pointRadius: 0 },
        { label: 'Simple', data: [], borderColor: '#888780', borderDash: [5, 3], backgroundColor: 'transparent', fill: false, tension: 0, pointRadius: 0 }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: {
          beginAtZero: true,
          ticks: { callback: function(v) { return '$' + (v >= 1000 ? Math.round(v / 1000) + 'k' : Math.round(v)); } }
        }
      }
    }
  });
  calculate();
}

function calculate() {
  var p = parseFloat(document.getElementById('principal').value);
  var r = parseFloat(document.getElementById('rate').value) / 100;
  var y = parseInt(document.getElementById('years').value);

  document.getElementById('principal-out').textContent = '$' + p.toLocaleString();
  document.getElementById('rate-out').textContent = r * 100 + '%';
  document.getElementById('years-out').textContent = y;

  var fv = p * Math.pow(1 + r, y);
  var interest = fv - p;
  var ret = ((fv - p) / p) * 100;

  document.getElementById('future-value').textContent = '$' + Math.round(fv).toLocaleString();
  document.getElementById('interest-earned').textContent = '$' + Math.round(interest).toLocaleString();
  document.getElementById('total-return').textContent = Math.round(ret) + '%';

  if (!chart) return;
  var labels = [];
  var compound = [];
  var simple = [];
  for (var i = 0; i <= y; i++) {
    labels.push('Year ' + i);
    compound.push(Math.round(p * Math.pow(1 + r, i)));
    simple.push(Math.round(p * (1 + r * i)));
  }
  chart.data.labels = labels;
  chart.data.datasets[0].data = compound;
  chart.data.datasets[1].data = simple;
  chart.update();
}
if (window.Chart) initChart();
</script>
