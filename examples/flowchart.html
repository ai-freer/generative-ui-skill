<!--
  Trigger prompt: "解释 JWT 认证流程"
  Widget type: SVG flowchart
  Guidelines used: core + color-palette + svg-setup + diagram
-->
<svg width="100%" viewBox="0 0 680 420">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Step 1: Client -->
  <g class="node c-gray" onclick="window.__widgetSendMessage('What credentials does the client send?')">
    <rect x="240" y="20" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="38" text-anchor="middle" dominant-baseline="central">Client</text>
    <text class="ts" x="340" y="56" text-anchor="middle" dominant-baseline="central">Sends credentials</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="340" y1="76" x2="340" y2="110" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 2: Auth server -->
  <g class="node c-purple" onclick="window.__widgetSendMessage('How does the auth server validate credentials?')">
    <rect x="220" y="110" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central">Auth server</text>
    <text class="ts" x="340" y="146" text-anchor="middle" dominant-baseline="central">Validates, signs JWT</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="340" y1="166" x2="340" y2="200" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 3: JWT token -->
  <g class="node c-teal" onclick="window.__widgetSendMessage('What are the three parts of a JWT?')">
    <rect x="200" y="200" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="218" text-anchor="middle" dominant-baseline="central">JWT token</text>
    <text class="ts" x="340" y="236" text-anchor="middle" dominant-baseline="central">Header + Payload + Signature</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="340" y1="256" x2="340" y2="290" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 4: API request -->
  <g class="node c-purple" onclick="window.__widgetSendMessage('How does the API server verify the token?')">
    <rect x="210" y="290" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="308" text-anchor="middle" dominant-baseline="central">API server</text>
    <text class="ts" x="340" y="326" text-anchor="middle" dominant-baseline="central">Verifies signature, reads claims</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="340" y1="346" x2="340" y2="370" class="arr" marker-end="url(#arrow)"/>

  <!-- Step 5: Response -->
  <g class="node c-gray">
    <rect x="250" y="370" width="180" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="392" text-anchor="middle" dominant-baseline="central">Protected resource</text>
  </g>
</svg>
