<!--
  Trigger prompt: "Show the solar system in 3D"
  Widget type: Three.js 3D scene with orbital animation
  Guidelines used: core + color-palette + 3d-scene
-->
<style>
canvas { display: block; width: 100% !important; height: 420px !important; }
#controls { display: flex; align-items: center; gap: 12px; padding: 10px 0 0; font-size: 13px; color: var(--color-text-secondary); }
</style>
<canvas id="c"></canvas>
<div id="controls">
  <button id="btn" onclick="togglePlay()">Pause</button>
  <label style="display:flex;align-items:center;gap:8px;flex:1">
    Speed <input type="range" min="1" max="10" value="5" step="1" style="flex:1" oninput="speedMul=this.value*0.2">
  </label>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" onload="init()"></script>
<script>
var speedMul = 1;
var scene, camera, renderer, controls;
function init() {
  if (!window.THREE || !THREE.OrbitControls) return;
  var canvas = document.getElementById('c');
  var W = canvas.clientWidth, H = 420;
  renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 1000);
  camera.position.set(0, 8, 16);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  var sunLight = new THREE.DirectionalLight(0xffffff, 0.9);
  sunLight.position.set(5, 8, 5);
  scene.add(sunLight);

  controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.3;

  var sunMesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.2, 16, 12),
    new THREE.MeshBasicMaterial({ color: 0xEF9F27 })
  );
  sunMesh.name = 'the Sun';
  scene.add(sunMesh);

  function makeOrbitRing(radius) {
    var ring = new THREE.Mesh(
      new THREE.RingGeometry(radius - 0.02, radius + 0.02, 64),
      new THREE.MeshBasicMaterial({ color: 0x888780, side: THREE.DoubleSide, transparent: true, opacity: 0.2 })
    );
    ring.rotation.x = -Math.PI / 2;
    scene.add(ring);
  }

  function makePlanet(radius, color, orbitR, name) {
    var mesh = new THREE.Mesh(
      new THREE.SphereGeometry(radius, 16, 12),
      new THREE.MeshLambertMaterial({ color: color })
    );
    mesh.name = name;
    scene.add(mesh);
    makeOrbitRing(orbitR);
    return mesh;
  }

  var earth = makePlanet(0.45, 0x378ADD, 4, 'Earth');
  var mars = makePlanet(0.35, 0xD85A30, 6.5, 'Mars');
  var jupiter = makePlanet(0.7, 0x7F77DD, 9.5, 'Jupiter');

  var clickTargets = [sunMesh, earth, mars, jupiter];
  var raycaster = new THREE.Raycaster();
  var mouse = new THREE.Vector2();
  var dragDist = 0, startX = 0, startY = 0;

  canvas.addEventListener('mousedown', function(e) { startX = e.clientX; startY = e.clientY; dragDist = 0; });
  canvas.addEventListener('mousemove', function(e) { dragDist += Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY); });
  canvas.addEventListener('click', function(e) {
    if (dragDist > 5) return;
    var rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    var hits = raycaster.intersectObjects(clickTargets);
    if (hits.length) {
      window.__widgetSendMessage('Tell me more about ' + hits[0].object.name);
    }
  });

  var t = 0, playing = true;

  window.togglePlay = function() {
    playing = !playing;
    document.getElementById('btn').textContent = playing ? 'Pause' : 'Play';
  };

  function animate() {
    requestAnimationFrame(animate);
    if (playing) {
      t += 0.005 * speedMul;
      earth.position.set(Math.cos(t * 1.0) * 4, 0, Math.sin(t * 1.0) * 4);
      mars.position.set(Math.cos(t * 0.53) * 6.5, 0, Math.sin(t * 0.53) * 6.5);
      jupiter.position.set(Math.cos(t * 0.22) * 9.5, 0, Math.sin(t * 0.22) * 9.5);
    }
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
}
if (window.THREE && THREE.OrbitControls) init();
</script>
