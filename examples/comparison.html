<!--
  Trigger prompt: "比较 REST 和 GraphQL"
  Widget type: SVG side-by-side comparison
  Guidelines used: core + color-palette + svg-setup + diagram
-->
<svg width="100%" viewBox="0 0 680 340">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- REST side -->
  <g class="node c-purple" onclick="window.__widgetSendMessage('Explain REST API design patterns')">
    <rect x="40" y="20" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="180" y="38" text-anchor="middle" dominant-baseline="central">REST</text>
    <text class="ts" x="180" y="56" text-anchor="middle" dominant-baseline="central">Multiple endpoints</text>
  </g>

  <!-- REST features -->
  <g class="c-purple">
    <rect x="60" y="96" width="240" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="180" y="116" text-anchor="middle" dominant-baseline="central">GET /users, GET /posts</text>
  </g>
  <g class="c-purple">
    <rect x="60" y="148" width="240" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="180" y="168" text-anchor="middle" dominant-baseline="central">Fixed response shape</text>
  </g>
  <g class="c-purple">
    <rect x="60" y="200" width="240" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="180" y="220" text-anchor="middle" dominant-baseline="central">HTTP caching built-in</text>
  </g>
  <g class="c-purple">
    <rect x="60" y="252" width="240" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="180" y="272" text-anchor="middle" dominant-baseline="central">Over-fetching common</text>
  </g>

  <!-- GraphQL side -->
  <g class="node c-teal" onclick="window.__widgetSendMessage('Explain GraphQL schema design')">
    <rect x="360" y="20" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="38" text-anchor="middle" dominant-baseline="central">GraphQL</text>
    <text class="ts" x="500" y="56" text-anchor="middle" dominant-baseline="central">Single endpoint</text>
  </g>

  <!-- GraphQL features -->
  <g class="c-teal">
    <rect x="380" y="96" width="240" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="500" y="116" text-anchor="middle" dominant-baseline="central">POST /graphql (query)</text>
  </g>
  <g class="c-teal">
    <rect x="380" y="148" width="240" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="500" y="168" text-anchor="middle" dominant-baseline="central">Client defines shape</text>
  </g>
  <g class="c-teal">
    <rect x="380" y="200" width="240" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="500" y="220" text-anchor="middle" dominant-baseline="central">Custom caching needed</text>
  </g>
  <g class="c-teal">
    <rect x="380" y="252" width="240" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="500" y="272" text-anchor="middle" dominant-baseline="central">Fetch exactly what you need</text>
  </g>

  <!-- Bottom summary -->
  <g class="box">
    <rect x="100" y="310" width="480" height="24" rx="4" stroke-width="0.5"/>
    <text class="ts" x="340" y="322" text-anchor="middle" dominant-baseline="central">REST: simplicity + caching | GraphQL: flexibility + efficiency</text>
  </g>
</svg>
