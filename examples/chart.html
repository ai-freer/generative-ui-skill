<!--
  Trigger prompt: "展示过去 6 个月的用户增长趋势"
  Widget type: Chart.js line chart
  Guidelines used: core + ui-components + color-palette + chart
-->
<div style="display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-bottom: 1.5rem;">
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Total users</div>
    <div style="font-size: 24px; font-weight: 500;" id="total-users">12,847</div>
  </div>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Monthly growth</div>
    <div style="font-size: 24px; font-weight: 500; color: var(--color-text-success);">+18%</div>
  </div>
  <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem;">
    <div style="font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px;">Avg. daily signups</div>
    <div style="font-size: 24px; font-weight: 500;">73</div>
  </div>
</div>

<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 8px; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #534AB7;"></span>New users</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #1D9E75;"></span>Active users</span>
</div>

<div style="position: relative; width: 100%; height: 280px;">
  <canvas id="growthChart"></canvas>
</div>

<div style="margin-top: 12px;">
  <button onclick="window.__widgetSendMessage('Break down user growth by region')">By region ↗</button>
  <button onclick="window.__widgetSendMessage('What is the user retention rate?')">Retention ↗</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js" onload="initChart()"></script>
<script>
function initChart() {
  const months = ['Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar'];
  new Chart(document.getElementById('growthChart'), {
    type: 'line',
    data: {
      labels: months,
      datasets: [
        {
          label: 'New users',
          data: [1840, 2100, 2450, 2680, 3120, 3580],
          borderColor: '#534AB7',
          backgroundColor: 'rgba(83, 74, 183, 0.08)',
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          pointHoverRadius: 6
        },
        {
          label: 'Active users',
          data: [5200, 5800, 6400, 7100, 8200, 9600],
          borderColor: '#1D9E75',
          backgroundColor: 'rgba(29, 158, 117, 0.08)',
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          pointHoverRadius: 6
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: {
          beginAtZero: true,
          ticks: {
            callback: function(v) { return v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v; }
          }
        }
      }
    }
  });
}
if (window.Chart) initChart();
</script>
