<!--
  Trigger prompt: "3D展示一个合成器控制器"
  Widget type: Three.js 3D product render (Product mode)
  Guidelines used: core + color-palette + 3d-scene (PBR Product mode)
-->
<style>
canvas { display: block; width: 100% !important; height: 420px !important; }
#controls { display: flex; align-items: center; gap: 12px; padding: 10px 0 0; font-size: 13px; color: var(--color-text-secondary); }
</style>
<canvas id="c"></canvas>
<div id="controls">
  <button onclick="setView('front')">Front</button>
  <button onclick="setView('top')">Top</button>
  <button onclick="setView('side')">Side</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" onload="init()"></script>
<script>
var scene, camera, renderer, controls;
var clickTargets = [];
var raycaster, mouse;
var dragDist = 0, startX = 0, startY = 0;
function init() {
  if (!window.THREE || !THREE.OrbitControls) return;
  var canvas = document.getElementById('c');
  var W = canvas.clientWidth, H = 420;
  renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.85;
  renderer.outputEncoding = THREE.sRGBEncoding;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x080808);
  camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 1000);
  camera.position.set(0, 6, 10);

  scene.add(new THREE.AmbientLight(0xffffff, 0.1));
  var sun = new THREE.DirectionalLight(0xffffff, 0.45);
  sun.position.set(4, 12, 6);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 50;
  sun.shadow.camera.left = -8;
  sun.shadow.camera.right = 8;
  sun.shadow.camera.top = 8;
  sun.shadow.camera.bottom = -8;
  scene.add(sun);

  controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.5;

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  canvas.addEventListener('mousedown', function(e) { startX = e.clientX; startY = e.clientY; dragDist = 0; });
  canvas.addEventListener('mousemove', function(e) { dragDist += Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY); });
  canvas.addEventListener('click', function(e) {
    if (dragDist > 5) return;
    var rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    var hits = raycaster.intersectObjects(clickTargets);
    if (hits.length && hits[0].object.name) {
      window.__widgetSendMessage('Tell me about the ' + hits[0].object.name);
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
}
if (window.THREE && THREE.OrbitControls) init();

// --- scene content starts here ---

// === Materials ===
var matChassis = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.85, roughness: 0.35 });
var matFrame = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness: 0.9, roughness: 0.2 });
var matPanel = new THREE.MeshStandardMaterial({ color: 0x181818, metalness: 0.75, roughness: 0.35 });
var matKnob = new THREE.MeshStandardMaterial({ color: 0x0e0e0e, metalness: 0.05, roughness: 0.82 });
var matKnobTop = new THREE.MeshStandardMaterial({ color: 0x141414, metalness: 0.15, roughness: 0.6 });
var matButton = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.1, roughness: 0.3 });

function makeLedMat(hex, intensity) {
  return new THREE.MeshStandardMaterial({ color: hex, emissive: hex, emissiveIntensity: intensity || 2.8, metalness: 0, roughness: 0.4 });
}

// === Chassis (layered for edge depth) ===
// Base body
var chassis = new THREE.Mesh(new THREE.BoxGeometry(8, 0.55, 5.2), matChassis);
chassis.position.set(0, 0.275, 0);
chassis.castShadow = true;
chassis.receiveShadow = true;
scene.add(chassis);
// Top frame / lip (slightly larger, thin — creates visible edge bevel)
var frame = new THREE.Mesh(new THREE.BoxGeometry(8.15, 0.08, 5.35), matFrame);
frame.position.set(0, 0.55, 0);
frame.castShadow = true;
scene.add(frame);
// Recessed panel surface
var panel = new THREE.Mesh(new THREE.BoxGeometry(7.6, 0.06, 4.7), matPanel);
panel.position.set(0, 0.56, 0);
panel.castShadow = true;
panel.receiveShadow = true;
scene.add(panel);

// === Knob factory ===
function addKnob(x, z, ledColor, name) {
  // Base skirt (wide flange where knob meets panel)
  var skirt = new THREE.Mesh(new THREE.CylinderGeometry(0.42, 0.46, 0.07, 32), matKnob);
  skirt.position.set(x, 0.62, z);
  skirt.castShadow = true;
  scene.add(skirt);

  // Knob body (proper proportions — height ~ radius, tapered)
  var knob = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.38, 0.44, 32), matKnob);
  knob.position.set(x, 0.875, z);
  knob.castShadow = true;
  knob.name = name;
  scene.add(knob);
  clickTargets.push(knob);

  // Flat top cap (not a dome)
  var cap = new THREE.Mesh(new THREE.CylinderGeometry(0.30, 0.32, 0.04, 32), matKnobTop);
  cap.position.set(x, 1.115, z);
  scene.add(cap);

  // Grip ring (subtle ridge around upper body)
  var grip = new THREE.Mesh(new THREE.TorusGeometry(0.335, 0.018, 8, 32), matKnobTop);
  grip.rotation.x = -Math.PI / 2;
  grip.position.set(x, 1.015, z);
  scene.add(grip);

  // LED ring (at base, bright, thick)
  var ring = new THREE.Mesh(new THREE.TorusGeometry(0.48, 0.04, 12, 48), makeLedMat(ledColor));
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(x, 0.585, z);
  scene.add(ring);

  // Indicator line on top cap
  var indicator = new THREE.Mesh(new THREE.BoxGeometry(0.022, 0.014, 0.15), makeLedMat(ledColor));
  indicator.position.set(x, 1.143, z - 0.13);
  scene.add(indicator);
}

// === Place knobs — 2 rows of 4 ===
// Vivid LED colors (more saturated than palette for emissive glow)
var knobColors = [0xFF2222, 0xFF9900, 0x4466FF, 0x22AAFF, 0xFF44CC, 0x44DD00, 0x00FFAA, 0xAA44FF];
var knobNames = ['Tempo', 'Pitch', 'Filter', 'Reverb', 'Volume', 'Attack', 'Decay', 'Scale'];
for (var i = 0; i < 4; i++) {
  addKnob(-2.4 + i * 1.6, -0.8, knobColors[i], knobNames[i]);
  addKnob(-2.4 + i * 1.6, 0.8, knobColors[i + 4], knobNames[i + 4]);
}

// === Step buttons — row of 8 ===
for (var j = 0; j < 8; j++) {
  var active = j < 5;
  var btn = new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 0.12, 0.4),
    active ? makeLedMat(0x00FF88, 3.5) : matButton
  );
  btn.position.set(-2.8 + j * 0.8, 0.62, 1.85);
  btn.castShadow = true;
  scene.add(btn);
}

// === Title label strip ===
var labelStrip = new THREE.Mesh(
  new THREE.BoxGeometry(5, 0.02, 0.12),
  new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.6, roughness: 0.4 })
);
labelStrip.position.set(-0.4, 0.57, -2.0);
scene.add(labelStrip);

// === Accent PointLights (warm + cool fill) ===
var light1 = new THREE.PointLight(0x7F77DD, 0.35, 12, 2);
light1.position.set(-3, 3, 4);
scene.add(light1);

var light2 = new THREE.PointLight(0x1D9E75, 0.25, 12, 2);
light2.position.set(3, 2, -3);
scene.add(light2);

var light3 = new THREE.PointLight(0xEF9F27, 0.2, 10, 2);
light3.position.set(0, 2, -2);
scene.add(light3);

// === Ground plane ===
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(30, 30),
  new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 0.3, roughness: 0.8 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// === Camera ===
camera.position.set(4, 4.5, 7);
camera.lookAt(0, 0.3, 0.5);

// === View presets ===
function setView(v) {
  var pos = { front: [0, 3, 10], top: [0, 12, 0.1], side: [10, 3, 0] }[v];
  camera.position.set(pos[0], pos[1], pos[2]);
  camera.lookAt(0, 0.3, 0);
  controls.update();
}
</script>
