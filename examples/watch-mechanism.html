<style>
canvas { display: block; width: 100% !important; height: 420px !important; }
.scene-wrap { position: relative; }
#labels { position: absolute; top: 0; left: 0; width: 100%; height: 420px; pointer-events: none; overflow: hidden; }
.label { position: absolute; font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; transform: translate(-50%, -100%); padding: 2px 6px; background: var(--color-bg-secondary); border-radius: 3px; }
#controls { display: flex; align-items: center; gap: 12px; padding: 10px 0 0; font-size: 13px; color: var(--color-text-secondary); }
</style>
<div class="scene-wrap">
  <canvas id="c"></canvas>
  <div id="labels"></div>
</div>
<div id="controls">
  <button id="btn" onclick="togglePlay()">Play</button>
  <button onclick="showStep(Math.max(0,step-1))">Prev</button>
  <button onclick="showStep(Math.min(steps.length-1,step+1))">Next</button>
  <span id="step-label" style="flex:1"></span>
  <label style="display:flex;align-items:center;gap:6px">
    Explode <input type="range" min="0" max="100" value="0" step="1" style="width:80px" oninput="setExploded(this.value/100*2.5)">
  </label>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" onload="init()"></script>
<script>
var scene, camera, renderer, controls;
var updateLabels = function() {};
var playing = false, timer, step = 0;
var steps = [];

function init() {
  if (!window.THREE || !THREE.OrbitControls) return;
  var canvas = document.getElementById('c');
  var W = canvas.clientWidth, H = 420;
  renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.outputEncoding = THREE.sRGBEncoding;

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 1000);
  camera.position.set(2, 5, 5);

  scene.add(new THREE.AmbientLight(0xffffff, 0.25));
  var sun = new THREE.DirectionalLight(0xffffff, 0.9);
  sun.position.set(3, 10, 5);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 30;
  sun.shadow.camera.left = -5;
  sun.shadow.camera.right = 5;
  sun.shadow.camera.top = 5;
  sun.shadow.camera.bottom = -5;
  scene.add(sun);

  controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0.2, 0, 0);

  var t = 0;
  function animate() {
    requestAnimationFrame(animate);
    if (playing && window.animParts) {
      t += 0.015;
      if (animParts.barrel) animParts.barrel.rotation.y = t * 0.2;
      if (animParts.center) animParts.center.rotation.y = -t * 0.5;
      if (animParts.third) animParts.third.rotation.y = t * 1.5;
      if (animParts.fourth) animParts.fourth.rotation.y = -t * 3;
      if (animParts.escape) animParts.escape.rotation.y = t * 6;
      if (animParts.pallet) animParts.pallet.rotation.y = Math.sin(t * 12) * 0.12;
      if (animParts.balance) animParts.balance.rotation.y = Math.sin(t * 8) * 0.5;
    }
    controls.update();
    updateLabels();
    renderer.render(scene, camera);
  }
  animate();
}
if (window.THREE && THREE.OrbitControls) init();

// ===================== Materials =====================
var matBrass = new THREE.MeshStandardMaterial({ color: 0xC9A84C, metalness: 0.88, roughness: 0.25 });
var matBrassLight = new THREE.MeshStandardMaterial({ color: 0xD4B85C, metalness: 0.85, roughness: 0.3 });
var matSteel = new THREE.MeshStandardMaterial({ color: 0x8A8D90, metalness: 0.92, roughness: 0.2 });

var matRuby = new THREE.MeshStandardMaterial({ color: 0xC0292E, emissive: 0xC0292E, emissiveIntensity: 0.4, metalness: 0.15, roughness: 0.1 });
var matBridge = new THREE.MeshStandardMaterial({ color: 0xB8A070, metalness: 0.75, roughness: 0.35 });
var matPlate = new THREE.MeshStandardMaterial({ color: 0xA09580, metalness: 0.7, roughness: 0.4 });
var matSpring = new THREE.MeshStandardMaterial({ color: 0x4477BB, metalness: 0.82, roughness: 0.3 });
var matRhodium = new THREE.MeshStandardMaterial({ color: 0xCCCDD0, metalness: 0.95, roughness: 0.1 });

// ===================== Helpers =====================
var explodableParts = [];
function regExplode(mesh, dir) {
  mesh.userData.basePos = mesh.position.clone();
  mesh.userData.explodeDir = dir;
  explodableParts.push(mesh);
}
function setExploded(f) {
  explodableParts.forEach(function(p) {
    p.position.copy(p.userData.basePos).addScaledVector(p.userData.explodeDir, f);
  });
}

// Gear profile using Shape — trapezoidal teeth with curved flanks
function createGearProfile(outerR, numTeeth, toothDepth) {
  var innerR = outerR - toothDepth;
  var shape = new THREE.Shape();
  var step = (Math.PI * 2) / numTeeth;
  var midR = (innerR + outerR) * 0.52;
  shape.moveTo(innerR, 0);
  for (var i = 0; i < numTeeth; i++) {
    var a = i * step;
    // Root gap → left flank (curved) → tip → right flank (curved) → root
    shape.lineTo(Math.cos(a + step * 0.15) * innerR, Math.sin(a + step * 0.15) * innerR);
    shape.lineTo(Math.cos(a + step * 0.22) * midR,   Math.sin(a + step * 0.22) * midR);
    shape.lineTo(Math.cos(a + step * 0.30) * outerR,  Math.sin(a + step * 0.30) * outerR);
    shape.lineTo(Math.cos(a + step * 0.50) * outerR,  Math.sin(a + step * 0.50) * outerR);
    shape.lineTo(Math.cos(a + step * 0.58) * midR,   Math.sin(a + step * 0.58) * midR);
    shape.lineTo(Math.cos(a + step * 0.65) * innerR,  Math.sin(a + step * 0.65) * innerR);
    shape.lineTo(Math.cos(a + step) * innerR,          Math.sin(a + step) * innerR);
  }
  shape.closePath();
  return shape;
}

function createGear(outerR, numTeeth, thickness, mat, opts) {
  opts = opts || {};
  var toothDepth = opts.toothDepth || outerR * 0.13;
  var spokeHoles = opts.spokeHoles || 0;

  var profile = createGearProfile(outerR, numTeeth, toothDepth);

  // Optional weight-reducing spoke cutouts
  if (spokeHoles > 0) {
    var iR = outerR - toothDepth;
    var cutR = iR * 0.18;
    var cutDist = iR * 0.52;
    for (var s = 0; s < spokeHoles; s++) {
      var sa = (s / spokeHoles) * Math.PI * 2;
      var hole = new THREE.Path();
      hole.absarc(Math.cos(sa) * cutDist, Math.sin(sa) * cutDist, cutR, 0, Math.PI * 2, true);
      profile.holes.push(hole);
    }
  }

  var geom = new THREE.ExtrudeGeometry(profile, { depth: thickness, bevelEnabled: false });
  geom.rotateX(-Math.PI / 2);
  geom.translate(0, -thickness / 2, 0);

  var g = new THREE.Group();
  var body = new THREE.Mesh(geom, mat);
  body.castShadow = true; body.receiveShadow = true;
  g.add(body);

  // Hub
  var hubR = opts.hubR || outerR * 0.14;
  var hub = new THREE.Mesh(new THREE.CylinderGeometry(hubR, hubR, thickness * 2, 16), mat);
  hub.castShadow = true;
  g.add(hub);
  return g;
}

// Escape wheel — star-shaped pointed teeth
function createEscapeWheel(outerR, numTeeth, thickness, mat) {
  var innerR = outerR * 0.62;
  var shape = new THREE.Shape();
  var step = (Math.PI * 2) / numTeeth;
  shape.moveTo(innerR, 0);
  for (var i = 0; i < numTeeth; i++) {
    var a = i * step;
    shape.lineTo(Math.cos(a + step * 0.32) * innerR,  Math.sin(a + step * 0.32) * innerR);
    shape.lineTo(Math.cos(a + step * 0.42) * (innerR + outerR) * 0.5, Math.sin(a + step * 0.42) * (innerR + outerR) * 0.5);
    shape.lineTo(Math.cos(a + step * 0.50) * outerR,  Math.sin(a + step * 0.50) * outerR);
    shape.lineTo(Math.cos(a + step * 0.58) * (innerR + outerR) * 0.5, Math.sin(a + step * 0.58) * (innerR + outerR) * 0.5);
    shape.lineTo(Math.cos(a + step * 0.68) * innerR,  Math.sin(a + step * 0.68) * innerR);
    shape.lineTo(Math.cos(a + step) * innerR,          Math.sin(a + step) * innerR);
  }
  shape.closePath();
  var geom = new THREE.ExtrudeGeometry(shape, { depth: thickness, bevelEnabled: false });
  geom.rotateX(-Math.PI / 2);
  geom.translate(0, -thickness / 2, 0);
  var g = new THREE.Group();
  var body = new THREE.Mesh(geom, mat);
  body.castShadow = true; body.receiveShadow = true;
  g.add(body);
  var hub = new THREE.Mesh(new THREE.CylinderGeometry(outerR * 0.12, outerR * 0.12, thickness * 2.5, 12), mat);
  hub.castShadow = true;
  g.add(hub);
  return g;
}

// Jewel bearing (ruby in polished setting)
function createJewel(r) {
  var g = new THREE.Group();
  // Setting ring
  var setting = new THREE.Mesh(new THREE.CylinderGeometry(r * 1.6, r * 1.6, 0.025, 16), matRhodium);
  setting.castShadow = true;
  g.add(setting);
  // Ruby stone
  var ruby = new THREE.Mesh(new THREE.CylinderGeometry(r, r, 0.03, 16), matRuby);
  ruby.position.y = 0.015;
  g.add(ruby);
  // Center hole
  var hole = new THREE.Mesh(new THREE.CylinderGeometry(r * 0.3, r * 0.3, 0.06, 8), matBluedSteel);
  ruby.add(hole);
  return g;
}

// Blued steel screw
function createScrew(r) {
  var g = new THREE.Group();
  var head = new THREE.Mesh(new THREE.CylinderGeometry(r, r, r * 0.5, 12), matBluedSteel);
  head.castShadow = true;
  g.add(head);
  // Slot
  var slot = new THREE.Mesh(new THREE.BoxGeometry(r * 1.6, r * 0.12, r * 0.25), matSteel);
  slot.position.y = r * 0.26;
  g.add(slot);
  return g;
}

palletGroup.add(pStone2);
// Axle

// ===================== 7. Balance Wheel =====================

// ===================== Accent PointLights =====================

// ===================== Camera =====================
camera.position.set(1.5, 5.5, 5);
camera.lookAt(0.2, 0, 0.2);

// ===================== Animation registry =====================
var animParts = {
  barrel: barrelGroup,
  center: centerGroup,
  third: thirdGroup,
  fourth: fourthGroup,
  escape: escapeGroup,
  pallet: palletGroup,
  balance: balanceGroup
};

// ===================== Labels =====================
var labelData = [
  { obj: barrelGroup, text: 'Mainspring barrel', yOff: 0.5 },
  { obj: centerGroup, text: 'Center wheel', yOff: 0.5 },
  { obj: thirdGroup, text: 'Third wheel', yOff: 0.4 },
  { obj: fourthGroup, text: 'Fourth wheel', yOff: 0.4 },
  { obj: escapeGroup, text: 'Escape wheel', yOff: 0.4 },
  { obj: palletGroup, text: 'Pallet fork', yOff: 0.35 },
  { obj: balanceGroup, text: 'Balance ⟳', yOff: 0.5 },
];
var labelEls = [];
var labelsDiv = document.getElementById('labels');
labelData.forEach(function(d) {
  var el = document.createElement('div');
  el.className = 'label';
  el.textContent = d.text;
  labelsDiv.appendChild(el);
  labelEls.push({ el: el, obj: d.obj, yOff: d.yOff });
});

updateLabels = function() {
  var c = document.getElementById('c');
  var W = c.clientWidth, H = 420;
  labelEls.forEach(function(l) {
    if (!l.obj.visible) { l.el.style.display = 'none'; return; }
    var pos = new THREE.Vector3();
    l.obj.getWorldPosition(pos);
    pos.y += l.yOff;
    pos.project(camera);
    if (pos.z > 1) { l.el.style.display = 'none'; return; }
    l.el.style.display = '';
    l.el.style.left = (pos.x * 0.5 + 0.5) * W + 'px';
    l.el.style.top = (-pos.y * 0.5 + 0.5) * H + 'px';
  });
};

// ===================== Step-through =====================
var bridges = [trainBridge, barrelBridge, balanceCock];
var cutouts = [];
// collect cutout meshes (they share cutoutMat)
scene.children.forEach(function(c) { if (c.material === cutoutMat) cutouts.push(c); });
var jewels = [barrelJewel, centerJewel, thirdJewel, fourthJewel, escapeJewel, palletJewel, balanceJewel];
var mechParts = [barrelGroup, centerGroup, thirdGroup, fourthGroup, escapeGroup, palletGroup, balanceGroup];

steps = [
  { label: '1. Base plate — the movement\'s foundation', show: [], bridges: false },
  { label: '2. Mainspring barrel — stores energy in a coiled spring', show: [barrelGroup], bridges: false },
  { label: '3. Gear train — center, third & fourth wheels step up speed', show: [barrelGroup, centerGroup, thirdGroup, fourthGroup], bridges: false },
  { label: '4. Escapement — escape wheel + pallet fork regulate release', show: [barrelGroup, centerGroup, thirdGroup, fourthGroup, escapeGroup, palletGroup], bridges: false },
  { label: '5. Balance wheel — oscillates to divide time into equal parts', show: [barrelGroup, centerGroup, thirdGroup, fourthGroup, escapeGroup, palletGroup, balanceGroup], bridges: false },
  { label: '6. Complete — bridges, jewels & screws assembled', show: [barrelGroup, centerGroup, thirdGroup, fourthGroup, escapeGroup, palletGroup, balanceGroup], bridges: true },
];

function showStep(n) {
  step = n;
  var s = steps[n];
  mechParts.forEach(function(p) { p.visible = false; });
  s.show.forEach(function(p) { p.visible = true; });
  // Bridges, cutouts, jewels, screws
  bridges.forEach(function(b) { b.visible = s.bridges; });
  cutouts.forEach(function(c) { c.visible = s.bridges; });
  jewels.forEach(function(j) {
    // Show jewel if its corresponding mech part is visible
    var idx = jewels.indexOf(j);
    j.visible = idx < mechParts.length && mechParts[idx].visible;
  });
  allScrews.forEach(function(sc) { sc.visible = s.bridges; });
  // Labels
  labelEls.forEach(function(l) {
    l.el.style.display = l.obj.visible ? '' : 'none';
  });
  document.getElementById('step-label').textContent = s.label;
}

function togglePlay() {
  playing = !playing;
  document.getElementById('btn').textContent = playing ? 'Pause' : 'Play';
  if (playing) {
    if (step < steps.length - 1) {
      timer = setInterval(function() {
        if (step < steps.length - 1) {
          showStep(step + 1);
        } else {
          clearInterval(timer);
        }
      }, 2500);
    }
  } else {
    clearInterval(timer);
  }
}

showStep(0);
</script>
