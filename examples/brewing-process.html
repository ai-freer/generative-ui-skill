<!--
  Trigger prompt: "用 3D 演示酿造啤酒的过程"
  Widget type: Three.js 3D scene with step-through animation
  Guidelines used: core + color-palette + 3d-scene (process demonstration)
  Key patterns demonstrated:
    - Spatial layout: objects spaced along x-axis, gap = 2× largest radius
    - HTML overlay labels: projected from 3D coords each frame
    - Step-through animation: cumulative reveal with play/pause
    - Raycaster drill-down on click
-->
<style>
canvas { display: block; width: 100% !important; height: 420px !important; }
.scene-wrap { position: relative; }
#labels { position: absolute; top: 0; left: 0; width: 100%; height: 420px; pointer-events: none; overflow: hidden; }
#controls { display: flex; align-items: center; gap: 12px; padding: 10px 0 0; font-size: 13px; color: var(--color-text-secondary); }
</style>
<div class="scene-wrap">
  <canvas id="c"></canvas>
  <div id="labels"></div>
</div>
<div id="controls">
  <button id="btn" onclick="togglePlay()">Play</button>
  <span id="step-label" style="flex:1">Milling</span>
  <button onclick="resetView()">Reset view</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js" onload="init()"></script>
<script>
var scene, camera, renderer, controls;
function init() {
  if (!window.THREE || !THREE.OrbitControls) return;
  var canvas = document.getElementById('c');
  var W = canvas.clientWidth, H = 420;
  renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 1000);
  camera.position.set(0, 5, 16);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  var sunLight = new THREE.DirectionalLight(0xffffff, 0.9);
  sunLight.position.set(5, 8, 5);
  scene.add(sunLight);

  controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.autoRotate = false;

  var stages = [];
  var stageLabels = ['Milling', 'Mashing', 'Boiling', 'Fermenting'];
  var stageColors = [0x888780, 0xEF9F27, 0xD85A30, 0x1D9E75];
  var labelData = [];

  var objectRadius = 0.9;
  var gap = objectRadius * 2 + 1.5;
  var totalWidth = (stageLabels.length - 1) * gap;
  var startX = -totalWidth / 2;

  for (var i = 0; i < stageLabels.length; i++) {
    var group = new THREE.Group();
    var tankH = [1.6, 1.8, 2.0, 1.7][i];
    var tank = new THREE.Mesh(
      new THREE.CylinderGeometry(objectRadius, objectRadius, tankH, 16),
      new THREE.MeshLambertMaterial({ color: stageColors[i] })
    );
    tank.position.y = tankH / 2;
    tank.name = stageLabels[i];
    group.add(tank);

    var lid = new THREE.Mesh(
      new THREE.CylinderGeometry(objectRadius + 0.1, objectRadius + 0.1, 0.12, 16),
      new THREE.MeshLambertMaterial({ color: stageColors[i], transparent: true, opacity: 0.5 })
    );
    lid.position.y = tankH + 0.06;
    group.add(lid);

    var xPos = startX + i * gap;
    group.position.set(xPos, 0, 0);
    group.visible = false;
    scene.add(group);
    stages.push(group);

    labelData.push({ obj: group, text: stageLabels[i], offsetY: tankH + 0.5 });
  }

  var step = 0, playing = false, timer;

  function showStep(n) {
    for (var i = 0; i < stages.length; i++) {
      stages[i].visible = i <= n;
    }
    document.getElementById('step-label').textContent = stageLabels[n];
  }

  window.togglePlay = function() {
    playing = !playing;
    document.getElementById('btn').textContent = playing ? 'Pause' : 'Play';
    if (playing) {
      timer = setInterval(function() {
        step = (step + 1) % stages.length;
        showStep(step);
      }, 2000);
    } else {
      clearInterval(timer);
    }
  };

  window.resetView = function() {
    camera.position.set(0, 5, 16);
    camera.lookAt(0, 0, 0);
    controls.update();
  };

  showStep(0);

  var raycaster = new THREE.Raycaster();
  var mouse = new THREE.Vector2();
  var dragDist = 0, startX2 = 0, startY2 = 0;

  canvas.addEventListener('mousedown', function(e) { startX2 = e.clientX; startY2 = e.clientY; dragDist = 0; });
  canvas.addEventListener('mousemove', function(e) { dragDist += Math.abs(e.clientX - startX2) + Math.abs(e.clientY - startY2); });
  canvas.addEventListener('click', function(e) {
    if (dragDist > 5) return;
    var rect = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    var allMeshes = [];
    stages.forEach(function(g) { if (g.visible) g.traverse(function(c) { if (c.isMesh) allMeshes.push(c); }); });
    var hits = raycaster.intersectObjects(allMeshes);
    if (hits.length) {
      var name = hits[0].object.name || hits[0].object.parent.children[0].name;
      if (name) window.__widgetSendMessage('Explain the ' + name.toLowerCase() + ' stage in beer brewing');
    }
  });

  function updateLabels() {
    var container = document.getElementById('labels');
    container.innerHTML = '';
    for (var i = 0; i < labelData.length; i++) {
      var d = labelData[i];
      if (!d.obj.visible) continue;
      var pos = new THREE.Vector3(d.obj.position.x, d.offsetY, d.obj.position.z);
      pos.project(camera);
      if (pos.z > 1) continue;
      var sx = (pos.x * 0.5 + 0.5) * W;
      var sy = (-pos.y * 0.5 + 0.5) * H;
      var el = document.createElement('div');
      el.style.cssText = 'position:absolute;left:' + sx + 'px;top:' + sy + 'px;transform:translate(-50%,-100%);font-size:12px;color:var(--color-text-secondary);white-space:nowrap;pointer-events:none';
      el.textContent = d.text;
      container.appendChild(el);
    }
  }

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
    updateLabels();
  }
  animate();
}
if (window.THREE && THREE.OrbitControls) init();
</script>
